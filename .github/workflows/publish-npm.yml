name: Build and Publish to npm

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_dir: linux-x64-gnu
            binary: reedo
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_dir: darwin-x64
            binary: reedo
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_dir: darwin-arm64
            binary: reedo
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_dir: win32-x64
            binary: reedo.exe

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to npm package
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} npm/${{ matrix.npm_dir }}/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_dir }}
          path: npm/${{ matrix.npm_dir }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    name: Publish to npm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare platform packages
        run: |
          for dir in linux-x64-gnu darwin-x64 darwin-arm64 win32-x64; do
            cp -r artifacts/$dir/* npm/$dir/
            chmod +x npm/$dir/reedo* 2>/dev/null || true
            cd npm/$dir
            npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
            cd ../..
          done

      - name: Set version on main package
        run: |
          cd npm/reedo
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
          # Sync optionalDependencies versions
          node -e "
            const pkg = require('./package.json');
            for (const dep of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[dep] = '${{ steps.version.outputs.version }}';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in linux-x64-gnu darwin-x64 darwin-arm64 win32-x64; do
            cd npm/$dir
            npm publish --access public || echo "Skipped $dir (already published?)"
            cd ../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/reedo
          npm publish --access public || echo "Skipped main package (already published?)"
